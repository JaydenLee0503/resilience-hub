<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clearline</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #eef1f7;
        background: #06070e;
        font: 14px/1.45 Arial, sans-serif;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      p {
        margin: 0 0 14px;
        color: #98a2bb;
      }
      .actions {
        display: grid;
        gap: 8px;
      }
      button {
        width: 100%;
        border: 1px solid rgba(91, 140, 255, 0.55);
        border-radius: 6px;
        background: rgba(91, 140, 255, 0.14);
        color: #eef1f7;
        padding: 11px 12px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
      }
      button.secondary {
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.04);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        min-height: 18px;
        color: #c4d0ff;
        font-size: 12px;
      }
      .spinner {
        display: inline-block;
        width: 11px;
        height: 11px;
        margin-right: 7px;
        border: 2px solid rgba(91, 140, 255, 0.3);
        border-top-color: #5b8cff;
        border-radius: 50%;
        vertical-align: -1px;
        animation: cl-spin 0.7s linear infinite;
      }
      @keyframes cl-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #summary {
        margin-top: 12px;
        max-height: 260px;
        overflow-y: auto;
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.5;
        color: #dfe6ff;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 10px;
      }
      #summary:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Clearline</h1>
    <p>Read this PDF or page. PII is tokenized in your browser before any AI sees it.</p>
    <div class="actions">
      <button id="summarize">Summarize here</button>
      <button id="send" class="secondary">Send to dashboard</button>
    </div>
    <div id="status" role="status"></div>
    <div id="summary"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
